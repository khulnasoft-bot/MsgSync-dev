<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coverage & Pricing | MsgSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --bg: #030712;
            --sidebar-bg: #09090b;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f9fafb;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        aside {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .logo i {
            color: var(--primary);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2.5rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .search-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .search-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .price-tag {
            font-family: monospace;
            font-weight: 600;
            color: var(--primary);
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .tab {
            padding: 1rem 0;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            font-weight: 500;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 1rem;
            width: 500px;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: #030712;
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>
    <aside>
        <div class="logo"><i data-lucide="zap"></i><span>MsgSync Console</span></div>
        <nav>
            <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="/clients" class="nav-item"><i data-lucide="users"></i> Clients</a>
            <a href="/campaigns" class="nav-item"><i data-lucide="mail"></i> Campaigns</a>
            <a href="/billing" class="nav-item"><i data-lucide="credit-card"></i> Billing</a>
            <a href="/bundles" class="nav-item"><i data-lucide="package"></i> Bundles</a>
            <a href="/coverage" class="nav-item active"><i data-lucide="globe"></i> Coverage</a>
        </nav>
    </aside>

    <main>
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1>Network Coverage & Rates</h1>
                <p>Global prefix-based pricing and sender ID approvals.</p>
            </div>
            <button class="btn btn-primary" onclick="showRateModal()"><i data-lucide="plus"></i> Add Rate</button>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('rates')">Global Rates</div>
            <div class="tab" onclick="switchTab('sender-ids')">Sender ID Approvals</div>
        </div>

        <div id="rates-view">
            <div class="search-row">
                <div class="search-box">
                    <i data-lucide="search" style="width: 18px;"></i>
                    <input type="text" placeholder="Search by country or prefix (e.g., United Kingdom or 44)"
                        oninput="filterRates(this.value)">
                </div>
            </div>

            <div class="glass-card">
                <table>
                    <thead>
                        <tr>
                            <th>Country</th>
                            <th>Prefix</th>
                            <th>Cost Per SMS</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rates-table">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="sender-ids-view" style="display: none;">
            <div class="glass-card">
                <table>
                    <thead>
                        <tr>
                            <th>Sender ID</th>
                            <th>Type</th>
                            <th>Organization</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sids-table">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Rate Modal -->
    <div class="modal" id="rateModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Configure Rate</h2>
            <form id="rateForm">
                <div class="form-group">
                    <label>Country Name</label>
                    <input type="text" id="country" placeholder="e.g. United States" required>
                </div>
                <div class="form-group">
                    <label>Dial Prefix (Country Code)</label>
                    <input type="text" id="prefix" placeholder="e.g. 1" required>
                </div>
                <div class="form-group">
                    <label>Cost ($ per message)</label>
                    <input type="number" id="cost" step="0.0001" value="0.0100" required>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
                    <button type="button" class="btn" style="background: none; color: white;"
                        onclick="hideRateModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Rate</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let allRates = [];

        async function loadRates() {
            const res = await fetch('/api/network/rates');
            allRates = await res.json();
            renderRates(allRates);
        }

        function renderRates(rates) {
            const list = document.getElementById('rates-table');
            list.innerHTML = rates.length ? rates.map(r => `
                <tr>
                    <td style="font-weight: 500;">${r.country}</td>
                    <td style="color: var(--text-muted)">+${r.prefix}</td>
                    <td class="price-tag">$${parseFloat(r.costPerSms).toFixed(4)}</td>
                    <td><span class="badge badge-active">${r.status}</span></td>
                    <td><button class="btn" style="padding: 0.4rem; background: rgba(255,255,255,0.05);" onclick="editRate('${r.prefix}', '${r.country}', ${r.costPerSms})"><i data-lucide="edit-2" style="width: 14px;"></i></button></td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">No rates configured yet.</td></tr>';
            lucide.createIcons({ props: { parent: list } });
        }

        async function loadSenderIds() {
            // Usually we'd fetch all pending SIDs for an admin view
            // For now, let's try to fetch for the root org as a demo
            const orgRes = await fetch('/api/organizations/root/sub-orgs');
            const orgs = await orgRes.json();
            if (!orgs.length) return;

            const res = await fetch(`/api/network/sender-id/${orgs[0].id}`);
            const sids = await res.json();
            const list = document.getElementById('sids-table');
            list.innerHTML = sids.length ? sids.map(sid => `
                <tr>
                    <td style="font-family: monospace; font-weight: 700;">${sid.name}</td>
                    <td style="font-size: 0.75rem;">${sid.type}</td>
                    <td>${orgs[0].name}</td>
                    <td><span class="badge" style="background: ${sid.status === 'APPROVED' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(245, 158, 11, 0.1)'}; color: ${sid.status === 'APPROVED' ? 'var(--success)' : '#f59e0b'}">${sid.status}</span></td>
                    <td>
                        ${sid.status === 'PENDING' ? `<button class="btn btn-primary" style="padding: 0.3rem 0.6rem; font-size: 0.7rem;" onclick="approveSID('${sid.id}')">Approve</button>` : '--'}
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">No sender IDs to review.</td></tr>';
        }

        function filterRates(val) {
            const query = val.toLowerCase();
            const filtered = allRates.filter(r => r.country.toLowerCase().includes(query) || r.prefix.includes(query));
            renderRates(filtered);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'rates') {
                document.getElementById('rates-view').style.display = 'block';
                document.getElementById('sender-ids-view').style.display = 'none';
                loadRates();
            } else {
                document.getElementById('rates-view').style.display = 'none';
                document.getElementById('sender-ids-view').style.display = 'block';
                loadSenderIds();
            }
        }

        function showRateModal() { document.getElementById('rateModal').style.display = 'flex'; }
        function hideRateModal() { document.getElementById('rateModal').style.display = 'none'; }

        function editRate(prefix, country, cost) {
            document.getElementById('prefix').value = prefix;
            document.getElementById('country').value = country;
            document.getElementById('cost').value = cost;
            showRateModal();
        }

        document.getElementById('rateForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                country: document.getElementById('country').value,
                prefix: document.getElementById('prefix').value,
                costPerSms: parseFloat(document.getElementById('cost').value)
            };
            const res = await fetch('/api/network/rates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) { hideRateModal(); loadRates(); }
        };

        async function approveSID(id) {
            await fetch(`/api/network/sender-id/${id}/approve`, { method: 'PATCH' });
            loadSenderIds();
        }

        loadRates();
    </script>
</body>

</html>
