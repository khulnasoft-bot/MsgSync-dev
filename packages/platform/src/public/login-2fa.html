<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication | MsgSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f9fafb;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0.75rem;
            color: white;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5rem;
            margin-bottom: 1.5rem;
            font-family: inherit;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="icon-circle">
            <i data-lucide="shield-check" size="32"></i>
        </div>
        <h1>Two-Factor Verification</h1>
        <p>Enter the 6-digit code from your authenticator app to continue.</p>

        <input type="text" id="code" maxlength="6" placeholder="000000" autofocus>
        <button class="btn" onclick="verify()">Verify & Login</button>

        <div style="margin-top: 1.5rem;">
            <a href="/login" style="color: var(--text-muted); font-size: 0.875rem; text-decoration: none;">Back to
                Login</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const temp_token = urlParams.get('temp_token');
            const code = document.getElementById('code').value;

            try {
                const res = await fetch('/api/auth/verify-2fa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ temp_token, code })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    alert(data.error || 'Invalid code');
                }
            } catch (e) {
                alert('An error occurred. Please try again.');
            }
        }

        document.getElementById('code').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verify();
        });
    </script>
</body>

</html>
