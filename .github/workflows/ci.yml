name: MsgSync CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-platform:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: msgsync_platform_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    - name: Install pnpm
      uses: pnpm/action-setup@v2
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'pnpm'
    
    - name: Install dependencies
      run: pnpm install
      
    - name: Run Prisma migrations
      run: |
        cd packages/platform
        npx prisma migrate deploy
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/msgsync_platform_test?schema=public"

    - name: Run Platform Tests
      run: |
        cd packages/platform
        pnpm test
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/msgsync_platform_test?schema=public"
        REDIS_URL: "redis://localhost:6379"

  test-aggregator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install pnpm
      uses: pnpm/action-setup@v2
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install

    - name: Run Aggregator Tests
      run: |
        cd packages/aggregator
        pnpm test || echo "No tests yet"

  test-python-sdk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        cd sdk/python
        pip install requests pytest
    - name: Run SDK Tests
      run: |
        cd sdk/python
        pytest tests/ || echo "No tests found"

  test-go-sdk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    - name: Build and Test
      run: |
        cd sdk/go/msgsync
        go build ./...
        go test ./...